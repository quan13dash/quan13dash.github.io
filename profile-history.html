<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile Picture History — Quan13Dash</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="/">Quan13Dash GitHub</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="profile-history.html" aria-current="page">Profile Pics</a></li>
      </ul>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌓</button>
    </nav>
  </header>

  <main class="container profile-history-page">
    <h1>Profile Picture History</h1>
    <p class="lead">A short timeline showing how my profile picture changed over time (also celebrate events).</p>

    <section class="timeline" id="timeline">
      <article class="entry featured" data-date="2026-02-25">
        <img src="assets/images/yoyleland-official.png" alt="yoyleland-official" />
        <div class="meta">2026 (present)</div>
        <button class="details-btn" data-id="2026" aria-label="Details for 2026">Details</button>
      </article>

      <article class="entry" data-date="2018-06-01">
        <img src="assets/images/hahahacked april fools 2026.png" alt="hahahacked april fools 2026" />
        <div class="meta">April Fools 2026</div>
        <button class="details-btn" data-id="2026AF" aria-label="Details for 2026AF">Details</button>
      </article>

      <article class="entry" data-date="2020-09-15">
        <img src="assets/images/2026-official.jpg" alt="2026-official" />
        <div class="meta">Lunar New Year 2026</div>
        <button class="details-btn" data-id="2026LY" aria-label="Details for 2026LY">Details</button>
      </article>
    </section>
  </main>

  <div id="pfp-modal" class="modal" aria-hidden="true">
    <div class="modal-inner">
      <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
      <img id="modal-img" src="" alt="">
      <div id="modal-caption" class="modal-caption"></div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
